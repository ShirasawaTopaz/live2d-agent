name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==2.3.2

      - name: Bind Poetry to setup-python interpreter
        run: poetry env use "${{ steps.setup-python.outputs.python-path }}"

      - name: Install dependencies
        run: poetry install --with dev

      - name: pytest collect only
        run: poetry run pytest --collect-only

      - name: ruff scoped check
        run: poetry run ruff check __main__.py build.py internal/config internal/prompt_manager internal/websocket test

      - name: mypy scoped check
        run: poetry run mypy __main__.py internal/config internal/prompt_manager internal/websocket

      - name: pre-commit all files
        run: poetry run pre-commit run --all-files
